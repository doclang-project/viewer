<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocLang Viewer</title>
  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="assets/doclang_v3_sail.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="cursor-hint" class="cursor-hint" role="tooltip" hidden></div>

  <header>
    <div class="header-brand">
      <a href="#" class="header-logo-link" id="home-link" title="Back to start">
        <img src="assets/doclang_v3_sail.svg" alt="DocLang" class="header-logo">
      </a>
      <h1>DocLang Viewer</h1>
      <nav class="page-nav" id="page-nav" hidden>
        <button type="button" id="btn-prev" disabled>Previous</button>
        <span id="page-indicator">Page 1 of 1</span>
        <button type="button" id="btn-next" disabled>Next</button>
      </nav>
    </div>
    <div class="header-center">
      <span class="doc-label" id="doc-label" hidden></span>
    </div>
    <div class="toolbar">
      <div class="toolbar-options-wrap">
        <button
          type="button"
          class="toolbar-options-btn"
          id="btn-toolbar-options"
          aria-expanded="false"
          aria-controls="toolbar-options-panel"
          aria-haspopup="true"
        >
          Options
        </button>
        <div class="toolbar-options-panel" id="toolbar-options-panel" role="menu" hidden>
          <div class="toolbar-options-heading" role="presentation">Panes</div>
          <label class="toolbar-options-item" id="toggle-page-pane-label">
            <input type="checkbox" id="toggle-page-pane" checked role="menuitemcheckbox">
            <span>Original page</span>
          </label>
          <label class="toolbar-options-item" id="toggle-markup-pane-label">
            <input type="checkbox" id="toggle-markup-pane" checked role="menuitemcheckbox">
            <span>DocLang</span>
          </label>
          <label class="toolbar-options-item" id="toggle-reading-pane-label">
            <input type="checkbox" id="toggle-reading-pane" checked role="menuitemcheckbox">
            <span>Reading view</span>
          </label>
          <div class="toolbar-options-divider" role="separator"></div>
          <button type="button" class="toolbar-options-reset" id="btn-reset-pane-layout" role="menuitem">
            Reset panes
          </button>
        </div>
      </div>
      <span class="header-divider" aria-hidden="true"></span>
      <span class="toolbar-file-group" id="toolbar-file-group">
        <label class="file-btn" id="open-file-btn">
          Open file
          <input type="file" id="input-archive" accept=".dclx,.zip,.dclg,.xml,application/zip,application/xml,text/xml">
        </label>
      </span>
      <button type="button" id="btn-demo">Load demo</button>
      <span class="header-divider" aria-hidden="true"></span>
      <a href="https://doclang.ai/" class="header-site-link">doclang.ai</a>
    </div>
  </header>

  <p class="drop-banner" id="drop-banner">Drop to open another file</p>

  <div class="empty-state" id="empty-state">
    <div class="empty-state-inner">
      <p class="empty-state-title">Drop a DocLang file here</p>
      <p class="empty-state-meta">Supported file types: <span id="empty-state-file-types"></span></p>
      <p class="empty-state-action">or <a href="#" class="text-link" id="demo-empty-link">load demo</a></p>
    </div>
  </div>

  <main class="split" id="main">
    <section class="pane pane-page-view">
      <div class="pane-header pane-page-header">
        <span class="pane-header-title">Original page</span>
        <div class="pane-page-controls">
          <div class="page-zoom-control" id="page-zoom-label" hidden>
            <label class="page-zoom-control-label" for="page-zoom">
              <span aria-hidden="true">Zoom</span>
            </label>
            <input
              type="range"
              id="page-zoom"
              min="100"
              max="300"
              step="10"
              value="100"
              aria-valuemin="100"
              aria-valuemax="300"
              aria-valuenow="100"
              aria-label="Page zoom"
            >
            <button
              type="button"
              id="page-zoom-reset"
              class="page-zoom-reset"
              title="Reset zoom"
              aria-label="Reset zoom"
              disabled
            >100%</button>
          </div>
          <button
            type="button"
            class="pane-settings-toggle"
            id="btn-settings-toggle"
            hidden
            aria-expanded="false"
            aria-controls="page-settings"
          >
            Options
          </button>
        </div>
      </div>
      <div class="pane-page-layout">
        <div class="pane-body" id="page-pane"></div>
        <div class="viewer-settings-layer" id="page-settings-layer" hidden>
          <button
            type="button"
            class="viewer-settings-scrim"
            id="page-settings-scrim"
            tabindex="-1"
            aria-label="Close options"
          ></button>
          <aside
            class="viewer-settings"
            id="page-settings"
            role="dialog"
            aria-modal="true"
            aria-labelledby="page-settings-title"
          >
            <div class="viewer-settings-header">
              <h2 class="viewer-settings-title" id="page-settings-title">Options</h2>
              <button type="button" class="viewer-settings-close" id="btn-page-settings-close" aria-label="Close options">
                ×
              </button>
            </div>
            <div class="viewer-settings-body">
              <label class="settings-option settings-option-primary" id="show-all-bboxes-label">
                <input type="checkbox" id="show-all-bboxes" checked>
                <span>Layout</span>
              </label>
              <div class="settings-subgroup" id="layout-subtoggles">
                <label class="settings-option settings-option-sub" id="show-reading-order-label">
                  <input type="checkbox" id="show-reading-order">
                  <span>Reading order</span>
                </label>
                <div class="settings-subgroup settings-reading-order-group" id="reading-order-subtoggles">
                  <label class="settings-option settings-option-sub settings-option-nested" id="reading-order-arrows-label">
                    <input type="checkbox" id="reading-order-arrows" checked>
                    <span>Arrows</span>
                  </label>
                  <label class="settings-option settings-option-sub settings-option-nested" id="reading-order-global-label">
                    <input type="checkbox" id="reading-order-global">
                    <span>Global numbering</span>
                  </label>
                </div>

                <label class="settings-option settings-option-sub" id="show-picture-contents-label">
                  <input type="checkbox" id="show-picture-contents">
                  <span>Picture contents</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-table-contents-label">
                  <input type="checkbox" id="show-table-contents">
                  <span>Table contents</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-fragment-links-label">
                  <input type="checkbox" id="show-fragment-links">
                  <span>Fragments</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-xref-links-label">
                  <input type="checkbox" id="show-xref-links">
                  <span>Cross-references</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-caption-links-label">
                  <input type="checkbox" id="show-caption-links">
                  <span>Captions</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-layout-badges-label">
                  <input type="checkbox" id="show-layout-badges" checked>
                  <span>Badges</span>
                </label>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
    <div
      class="pane-splitter"
      id="splitter-0"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize Original page and DocLang panes"
      tabindex="0"
      hidden
    ></div>
    <section class="pane pane-markup">
      <div class="pane-header">DocLang</div>
      <div class="pane-body" id="markup-pane"></div>
    </section>
    <div
      class="pane-splitter"
      id="splitter-1"
      role="separator"
      aria-orientation="vertical"
      aria-label="Resize DocLang and Reading view panes"
      tabindex="0"
      hidden
    ></div>
    <section class="pane pane-reading">
      <div class="pane-header pane-reading-header">
        <span class="pane-header-title">Reading view</span>
        <button
          type="button"
          class="pane-settings-toggle"
          id="btn-reading-settings-toggle"
          hidden
          aria-expanded="false"
          aria-controls="reading-settings"
        >
          Options
        </button>
      </div>
      <div class="pane-reading-layout">
        <div class="pane-body" id="rendered-pane"></div>
        <div class="viewer-settings-layer" id="reading-settings-layer" hidden>
          <button
            type="button"
            class="viewer-settings-scrim"
            id="reading-settings-scrim"
            tabindex="-1"
            aria-label="Close options"
          ></button>
          <aside
            class="viewer-settings"
            id="reading-settings"
            role="dialog"
            aria-modal="true"
            aria-labelledby="reading-settings-title"
          >
            <div class="viewer-settings-header">
              <h2 class="viewer-settings-title" id="reading-settings-title">Options</h2>
              <button type="button" class="viewer-settings-close" id="btn-reading-settings-close" aria-label="Close options">
                ×
              </button>
            </div>
            <div class="viewer-settings-body">
              <div class="settings-option settings-option-primary settings-option-heading" id="reading-layers-label">Layers</div>
              <div class="settings-subgroup" id="reading-layer-toggles" role="group" aria-labelledby="reading-layers-label">
                <label class="settings-option settings-option-sub" id="show-reading-furniture-label">
                  <input type="checkbox" id="show-reading-furniture" checked>
                  <span>Furniture</span>
                </label>
                <label class="settings-option settings-option-sub" id="show-reading-background-label">
                  <input type="checkbox" id="show-reading-background" checked>
                  <span>Background</span>
                </label>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="demo-data.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
